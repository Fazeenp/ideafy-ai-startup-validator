name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop old containers
        run: docker compose down || true

      - name: Build and start
        run: docker compose up -d --build

      - name: Cleanup old images
        run: docker image prune -af
